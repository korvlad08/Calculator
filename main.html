<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <title>Calculator</title>
  </head>
  <style>
    #display {
      width: 100%;
      font-size: 1.5rem;
      text-align: right;
      padding: 0.5rem;
    }

    #calculate {
      width: 100%;
    }
  </style>

  <body>
    <main class="container" style="max-width: 600px; margin-top: 10vh">
      <article style="text-align: center; margin-bottom: 2rem">
        <h1>Calculator</h1>
        <p>This is a simple calculator.</p>
      </article>
      <article style="text-align: center; margin-bottom: 2rem">
        <label for="display" class="display"> Enter the expression: </label>
        <input type="text" id="display" class="display" />
        <button id="calculate" class="calculate">Calculate</button>
      </article>
    </main>
    <script src="main.js"></script>
  </body>
</html>
